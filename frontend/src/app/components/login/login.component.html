<div class="login-container">
  <div class="login-card animate-fade-in">
    <div class="login-header">
      <img src="assets/imagenes/logo.jpg" alt="Logo EIE" class="login-logo">
      <h2>SISTEMA DE GESTIÓN</h2>
      <h3>Escuela de Idiomas del Ejército</h3>
    </div>

    <form (ngSubmit)="onLogin()" #loginForm="ngForm">
      <div class="form-group">
        <label for="email">Correo Electrónico</label>
        <div class="input-with-icon">
          <i class="material-icons-outlined">email</i>
          <input 
            type="email" 
            id="email" 
            name="email" 
            [(ngModel)]="credenciales.email" 
            class="form-control" 
            placeholder="admin@eie.edu.bo" 
            required>
        </div>
      </div>

      <div class="form-group">
        <label for="password">Contraseña</label>
        <div class="input-with-icon">
          <i class="material-icons-outlined">lock</i>
          <input 
            type="password" 
            id="password" 
            name="password" 
            [(ngModel)]="credenciales.password" 
            class="form-control" 
            placeholder="••••••••" 
            required>
        </div>
      </div>

      <div *ngIf="mensajeError" class="error-box">
        {{ mensajeError }}
      </div>

      <button type="submit" class="btn-login" [disabled]="!loginForm.valid">
        INICIAR SESIÓN
      </button>

      <div class="login-footer">
        <a routerLink="/" class="back-link mt-2">
          <i class="material-icons-outlined">arrow_back</i> Volver al Inicio
        </a>
      </div>
    </form>
  </div>
</div>
